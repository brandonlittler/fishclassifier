apiVersion: apps/v1
kind: Deployment
metadata:
  name: fish-classifier
  namespace: fish-classifier
  labels:
    app: fish-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fish-classifier
  template:
    metadata:
      labels:
        app: fish-classifier
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: fish-classifier
        image: fishclassifieracr01.azurecr.io/fish-classifier:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 7860
          name: http
          protocol: TCP
        env:
        - name: GRADIO_SERVER_NAME
          value: "0.0.0.0"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
